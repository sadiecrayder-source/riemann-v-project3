    <style>
        :root { --pink: #ff007f; --bg: #0a0508; }
        body { background: var(--bg); color: white; font-family: 'Inter'; margin: 0; text-align: center; overflow-x: hidden; }
        
        /* Navigation */
        nav { background: #1a0d14; padding: 1rem 5%; display: flex; justify-content: space-between; border-bottom: 2px solid var(--pink); position: sticky; top: 0; z-index: 1000; }
        nav a { color: white; text-decoration: none; margin-left: 20px; opacity: 0.6; font-weight: bold; }

        /* Audit Card */
        .card { max-width: 650px; margin: 80px auto; padding: 50px; background: #1a0d14; border: 1px solid var(--pink); border-radius: 30px; box-shadow: 0 0 30px rgba(255,0,127,0.15); position: relative; }
        h1 { font-family: 'Orbitron'; color: var(--pink); margin-bottom: 20px; }
        
        .math-box { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 15px; margin: 25px 0; border: 1px solid #333; }
        
        input { background: transparent; border: 1px solid var(--pink); color: var(--pink); padding: 15px; font-size: 1.5rem; text-align: center; border-radius: 10px; width: 220px; font-family: 'Orbitron'; }
        
        .btn { background: var(--pink); color: white; border: none; padding: 15px 40px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 25px; font-family: 'Orbitron'; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* Emoji Effects */
        .emoji-drop { position: fixed; font-size: 3rem; animation: fall 1s forwards; pointer-events: none; z-index: 2000; }
        @keyframes fall { from { top: -50px; opacity: 1; } to { top: 100vh; opacity: 0; } }

        #feedback { margin-top: 30px; font-weight: bold; font-family: 'Orbitron'; height: 30px; }
    </style>
