<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Riemann-V | Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff007f; --bg: #0a0508; }
        body { background: var(--bg); color: white; font-family: 'Inter'; margin: 0; }
        nav { background: #1a0d14; padding: 1rem 5%; display: flex; justify-content: space-between; border-bottom: 2px solid var(--pink); position: sticky; top: 0; z-index: 1000; }
        nav a { color: white; text-decoration: none; margin-left: 20px; opacity: 0.6; font-weight: bold; }
        nav a.active { opacity: 1; color: var(--pink); }
        .sim-section { padding: 40px 10%; border-bottom: 1px solid #333; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 30px; }
        .viz-box { background: #1a0d14; padding: 20px; border: 1px solid var(--pink); border-radius: 15px; }
        input { background: transparent; border: 1px solid var(--pink); color: white; padding: 10px; border-radius: 5px; margin: 10px; width: 200px; }
        input[type="range"] { width: 60%; accent-color: var(--pink); }
        canvas { max-height: 300px; }
    </style>
</head>
